    <polyline points="12,64 120,128 228,64" fill="none" stroke="url(#gold)" stroke-width="14" />
    <line x1="120" y1="128" x2="120" y2="256" stroke="url(#gold)" stroke-width="14" />
    <polygon points="120,18 196,63 196,149 120,194 44,149 44,63" fill="#173630" fill-opacity="0.75" stroke="#ffecc4" stroke-opacity="0.6" stroke-width="6" />
  </g>

  <g fill="none" stroke="#f6deaa" stroke-opacity="0.22" stroke-width="2">

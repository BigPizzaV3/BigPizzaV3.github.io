    <radialGradient id="glow" cx="0.5" cy="0.45" r="0.7">
      <stop offset="0" stop-color="#fff3cf" stop-opacity="0.9" />
      <stop offset="0.4" stop-color="#ffd78e" stop-opacity="0.24" />
      <stop offset="1" stop-color="#ffd78e" stop-opacity="0" />
    </radialGradient>
  </defs>

  <rect width="1200" height="720" rx="40" fill="url(#bg)" />
  <rect x="28" y="28" width="1144" height="664" rx="30" fill="none" stroke="#f1d7a5" stroke-opacity="0.25" />
  <circle cx="860" cy="240" r="290" fill="url(#glow)" />
  <circle cx="940" cy="520" r="180" fill="#9bd0b2" fill-opacity="0.08" />
  <circle cx="210" cy="120" r="120" fill="#ffe1a7" fill-opacity="0.08" />

  <g transform="translate(724 150)">

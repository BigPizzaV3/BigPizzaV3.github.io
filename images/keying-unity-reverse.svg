<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">KeYing Unity Reverse</title>
  <desc id="desc">Cover art for the course 科英 - Unity逆向.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#173630" />
      <stop offset="0.55" stop-color="#214b44" />
      <stop offset="1" stop-color="#102621" />
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
